<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0e0b1e"/>
  <!-- Hole rings (depth effect) -->
  <ellipse cx="50" cy="62" rx="32" ry="12" fill="#1a1535"/>
  <ellipse cx="50" cy="62" rx="24" ry="8" fill="#110e2a"/>
  <ellipse cx="50" cy="62" rx="15" ry="5" fill="#0a0818"/>
  <!-- Rabbit ears -->
  <ellipse cx="38" cy="28" rx="6" ry="14" fill="#c4b5fd" transform="rotate(-10 38 28)"/>
  <ellipse cx="62" cy="26" rx="6" ry="14" fill="#c4b5fd" transform="rotate(10 62 26)"/>
  <ellipse cx="38" cy="29" rx="3.5" ry="10" fill="#7c3aed" transform="rotate(-10 38 29)"/>
  <ellipse cx="62" cy="27" rx="3.5" ry="10" fill="#7c3aed" transform="rotate(10 62 27)"/>
  <!-- Rabbit head -->
  <ellipse cx="50" cy="50" rx="16" ry="15" fill="#c4b5fd"/>
  <!-- Eyes -->
  <circle cx="44" cy="47" r="2.5" fill="#4c1d95"/>
  <circle cx="56" cy="47" r="2.5" fill="#4c1d95"/>
  <circle cx="44.8" cy="46.2" r="0.8" fill="white"/>
  <circle cx="56.8" cy="46.2" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="53" rx="2" ry="1.2" fill="#a78bfa"/>
  <!-- Glow ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
</svg>
