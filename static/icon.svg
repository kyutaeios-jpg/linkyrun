<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d2a1e"/>
  <!-- Tree trunk -->
  <rect x="44" y="62" width="12" height="22" rx="4" fill="#5d4037"/>
  <!-- Tree canopy layers -->
  <polygon points="50,8 74,38 26,38" fill="#1b5e20"/>
  <polygon points="50,22 76,54 24,54" fill="#2e7d32"/>
  <polygon points="50,35 78,68 22,68" fill="#388e3c"/>
