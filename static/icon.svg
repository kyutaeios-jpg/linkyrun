<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF4ECD"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFE8DF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Speed lines (left) -->
  <line x1="8" y1="38" x2="22" y2="38" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="8" y1="50" x2="18" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="62" x2="22" y2="62" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- Chain link left ring -->
  <ellipse cx="36" cy="50" rx="11" ry="7" fill="none" stroke="url(#chain)" stroke-width="7" stroke-linecap="round"/>
  <!-- Chain link right ring -->
  <ellipse cx="64" cy="50" rx="11" ry="7" fill="none" stroke="url(#chain)" stroke-width="7" stroke-linecap="round"/>
  <!-- Center overlap (connecting bar) -->
  <rect x="40" y="43.5" width="20" height="13" fill="url(#bg)"/>
  <line x1="40" y1="43.5" x2="60" y2="43.5" stroke="url(#chain)" stroke-width="7"/>
  <line x1="40" y1="56.5" x2="60" y2="56.5" stroke="url(#chain)" stroke-width="7"/>
  <!-- Speed lines (right) -->
  <line x1="78" y1="38" x2="92" y2="38" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="92" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="62" x2="92" y2="62" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
</svg>
