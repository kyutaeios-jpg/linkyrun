<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Linky Run</title>
    <meta name="description" content="위키 링크를 타고 목표 페이지까지 도달하는 게임">
    <meta name="theme-color" content="#FF6B35">
    <meta name="google-site-verification" content="uWHWcrFeKAiy8pQIEenbsPxiuBNNoMIK_QrLLZVRp5o" />
    <meta name="naver-site-verification" content="d82340002553fb524e4dcdbfdfae201601fb89d3" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Linky Run">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/style.css?v={{ ver }}">
    <script src="/static/js/i18n.js?v={{ ver }}"></script>
    <style>
        /* 언어 선택 버튼 */
        .lang-selector {
            position: absolute;
            top: calc(16px + env(safe-area-inset-top));
            right: 16px;
            z-index: 100;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 20px;
            padding: 6px 14px; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; gap: 6px;
        }
        .lang-btn:active { opacity: 0.7; }
        .lang-dropdown {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: #0E1525; border: 1px solid #1E2D45;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            min-width: 160px;
        }
        .lang-dropdown.hidden { display: none; }
        .lang-option {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 16px; width: 100%; text-align: left;
            background: none; border: none; color: #F0F4FF;
            font-size: 0.88rem; cursor: pointer; font-family: inherit;
        }
        .lang-option:hover { background: rgba(255,255,255,0.06); }
        .lang-option.active { color: #FF6B35; font-weight: 700; }
        /* 위키 선택 카드 */
        .wiki-cards {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; padding: 4px 0;
        }
        .wiki-card {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 20px 12px;
            background: var(--card-bg, #0E1525);
            border: 1.5px solid var(--border, #1E2D45);
            border-radius: 16px; cursor: pointer;
            font-family: inherit; color: var(--text, #F0F4FF);
            transition: border-color .15s, background .15s;
            text-align: center;
        }
        .wiki-card:hover { border-color: var(--accent, #FF6B35); }
        .wiki-card:active { opacity: 0.75; }
        .wiki-card-flag { font-size: 2rem; line-height: 1; }
        .wiki-card-name { font-size: 0.92rem; font-weight: 700; }
        .wiki-card-desc { font-size: 0.75rem; color: var(--text-muted, #7B8FAD); }
        /* 선택된 위키 배지 */
        .wiki-badge {
            font-size: 0.75rem; font-weight: 600;
            background: rgba(255,107,53,0.15);
            color: var(--accent, #FF6B35);
            border-radius: 10px; padding: 2px 8px;
            margin-left: 6px; vertical-align: middle;
        }
    </style>
</head>
<body class="index-page">

    <!-- ══════════════════════════════════════════
         화면 0: 인트로
    ══════════════════════════════════════════ -->
    <div class="screen" id="screen-intro">
        <header class="hero" style="position:relative;">
            <!-- UI 언어 선택 버튼 -->
            <div class="lang-selector">
                <button class="lang-btn" id="lang-btn">🌐 <span id="lang-btn-label">한국어</span></button>
                <div class="lang-dropdown hidden" id="lang-dropdown">
                    <button class="lang-option" data-lang="namu">🇰🇷 한국어</button>
                    <button class="lang-option" data-lang="en">🇺🇸 English</button>
                    <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
                    <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
                    <button class="lang-option" data-lang="ja">🇯🇵 日本語</button>
                </div>
            </div>

            <div class="hero-content">
                <div class="hero-logo">🔗</div>
                <h1 class="hero-title">Linky Run</h1>
                <p class="hero-subtitle" data-i18n="subtitle">링크를 타고 목표 페이지까지 달려가세요</p>
            </div>
        </header>

        <main class="container">
            <section class="card rules-card">
                <h3 class="section-title" data-i18n="howToPlay">게임 방법</h3>
                <ol class="rules-list">
                    <li><span data-i18n-html="rule1">난이도 선택 → <strong>시작·목표 페이지</strong> 자동 배정<br>또는 직접 원하는 페이지 입력</span></li>
                    <li><span data-i18n-html="rule2"><strong>내부 링크만</strong> 클릭해서 목표 페이지까지 이동</span></li>
                    <li><span data-i18n="rule3">최단 시간 · 최소 클릭으로 도달하면 승리!</span></li>
                    <li><span data-i18n="rule4">뒤로 가기 · 검색 · 외부 링크 사용 금지</span></li>
                </ol>
            </section>

            <button class="btn-start btn-start-big" id="btn-go-difficulty">
                <span data-i18n="btnStart">게임 시작하기</span>
                <span class="btn-start-icon">▶</span>
            </button>

            <button class="btn-leaderboard-outline" id="btn-open-lb-intro">
                <span data-i18n="btnRankingFull">🏆 랭킹 보기</span>
            </button>
        </main>
    </div>

    <!-- ══════════════════════════════════════════
         화면 1: 위키 선택
    ══════════════════════════════════════════ -->
    <div class="screen screen-hidden" id="screen-wiki">
        <header class="diff-header">
            <button class="btn-back" id="btn-back-wiki" data-i18n="btnBack">← 뒤로</button>
            <h2 class="diff-header-title" data-i18n="wikiSelectTitle">위키 선택</h2>
            <div style="width:56px"></div>
        </header>
        <main class="container diff-container">
            <div class="card">
                <div class="wiki-cards">
                    <button class="wiki-card" data-wiki="namu">
                        <span class="wiki-card-flag">🇰🇷</span>
                        <span class="wiki-card-name">나무위키</span>
                        <span class="wiki-card-desc">Korean wiki</span>
                    </button>
                    <button class="wiki-card" data-wiki="ko">
                        <span class="wiki-card-flag">🇰🇷</span>
                        <span class="wiki-card-name">위키백과</span>
                        <span class="wiki-card-desc">한국어 Wikipedia</span>
                    </button>
                    <button class="wiki-card" data-wiki="en">
                        <span class="wiki-card-flag">🇺🇸</span>
                        <span class="wiki-card-name">Wikipedia</span>
                        <span class="wiki-card-desc">English</span>
                    </button>
                    <button class="wiki-card" data-wiki="de">
                        <span class="wiki-card-flag">🇩🇪</span>
                        <span class="wiki-card-name">Wikipedia</span>
                        <span class="wiki-card-desc">Deutsch</span>
                    </button>
                    <button class="wiki-card" data-wiki="fr">
                        <span class="wiki-card-flag">🇫🇷</span>
                        <span class="wiki-card-name">Wikipédia</span>
                        <span class="wiki-card-desc">Français</span>
                    </button>
                    <button class="wiki-card" data-wiki="ja">
                        <span class="wiki-card-flag">🇯🇵</span>
                        <span class="wiki-card-name">ウィキペディア</span>
                        <span class="wiki-card-desc">日本語</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- ══════════════════════════════════════════
         화면 2: 난이도 선택
    ══════════════════════════════════════════ -->
    <div class="screen screen-hidden" id="screen-difficulty">
        <header class="diff-header">
            <button class="btn-back" id="btn-back-diff" data-i18n="btnBack">← 뒤로</button>
            <h2 class="diff-header-title">
                <span data-i18n="screenDiffTitle">게임 시작</span>
                <span class="wiki-badge" id="wiki-badge">나무위키</span>
            </h2>
            <button class="btn-back-ghost" id="btn-open-lb-diff" data-i18n="btnRanking">🏆 랭킹</button>
        </header>

        <main class="container diff-container">

            <!-- 랜덤 게임 -->
            <div class="card">
                <div class="section-title" data-i18n="randomGameTitle">랜덤 게임</div>
                <p class="diff-desc" data-i18n="randomGameDesc">난이도를 고르면 출발지는 랜덤으로, 목표지는 난이도에 맞게 배정됩니다.</p>
                <div class="diff-grid">
                    <button class="diff-card diff-easy" data-difficulty="easy">
                        <span class="diff-card-icon">🟢</span>
                        <span class="diff-card-name" data-i18n="diffEasy">쉬움</span>
                        <span class="diff-card-detail" data-i18n="diffEasyDetail">인기 페이지</span>
                    </button>
                    <button class="diff-card diff-medium" data-difficulty="medium">
                        <span class="diff-card-icon">🟡</span>
                        <span class="diff-card-name" data-i18n="diffMedium">보통</span>
                        <span class="diff-card-detail" data-i18n="diffMediumDetail">중간 페이지</span>
                    </button>
                    <button class="diff-card diff-hard" data-difficulty="hard">
                        <span class="diff-card-icon">🟠</span>
                        <span class="diff-card-name" data-i18n="diffHard">어려움</span>
                        <span class="diff-card-detail" data-i18n="diffHardDetail">마니아용</span>
                    </button>
                    <button class="diff-card diff-very-hard" data-difficulty="very_hard">
                        <span class="diff-card-icon">🔴</span>
                        <span class="diff-card-name" data-i18n="diffVeryHard">매우 어려움</span>
                        <span class="diff-card-detail" data-i18n="diffVeryHardDetail">고수 도전</span>
                    </button>
                </div>
            </div>

            <!-- 직접 입력 -->
            <div class="card custom-card">
                <div class="section-title" data-i18n="customTitle">직접 설정</div>
                <div class="input-group">
                    <label class="input-label">
                        <span class="label-badge start-badge" data-i18n="labelStart">시작</span>
                    </label>
                    <div class="input-row">
                        <input type="text" id="start-input" class="text-input"
                               data-i18n-placeholder="placeholderPage"
                               placeholder="페이지 이름"
                               autocomplete="off" spellcheck="false"
                               list="page-suggestions">
                        <button class="btn-random" id="start-random" data-i18n-title="labelStart" title="랜덤">🎲</button>
                    </div>
                </div>
                <div class="setup-arrow">↓</div>
                <div class="input-group">
                    <label class="input-label">
                        <span class="label-badge goal-badge" data-i18n="labelGoal">목표</span>
                    </label>
                    <div class="input-row">
                        <input type="text" id="goal-input" class="text-input"
                               data-i18n-placeholder="placeholderPage"
                               placeholder="페이지 이름"
                               autocomplete="off" spellcheck="false"
                               list="page-suggestions">
                        <button class="btn-random" id="goal-random" data-i18n-title="labelGoal" title="랜덤">🎲</button>
                    </div>
                </div>
                <button class="btn-start" id="btn-custom-start">
                    <span class="btn-start-text" data-i18n="btnCustomStart">게임 시작</span>
                    <span class="btn-start-icon">▶</span>
                </button>
            </div>

            <datalist id="page-suggestions"></datalist>

        </main>
    </div>

    <!-- ══════════════════════════════════════════
         랭킹 모달
    ══════════════════════════════════════════ -->
    <div class="modal-overlay" id="leaderboard-modal" hidden>
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="modal-title" data-i18n="modalRankingTitle">🏆 랭킹</h2>
                <button class="modal-close" id="close-leaderboard">✕</button>
            </div>
            <div class="lb-tabs">
                <button class="lb-tab lb-tab-active" data-difficulty="easy" data-i18n="tabEasy">🟢 쉬움</button>
                <button class="lb-tab" data-difficulty="medium" data-i18n="tabMedium">🟡 보통</button>
                <button class="lb-tab" data-difficulty="hard" data-i18n="tabHard">🟠 어려움</button>
                <button class="lb-tab" data-difficulty="very_hard" data-i18n="tabVeryHard">🔴 매우 어려움</button>
            </div>
            <div id="lb-content" class="lb-content">
                <div class="lb-empty" data-i18n="lbSelect">탭을 선택해서 랭킹을 확인하세요</div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }

        /* ── UI 언어 선택 (별도 — 게임 위키와 무관) ─── */
        const LANG_LABELS = {
            namu: '한국어', en: 'English', de: 'Deutsch',
            fr: 'Français', ja: '日本語',
        };
        const DEVICE_LANG_MAP = { ko: 'namu', en: 'en', de: 'de', fr: 'fr', ja: 'ja' };
        const deviceCode = (navigator.language || 'ko').split('-')[0].toLowerCase();
        let selectedLang = DEVICE_LANG_MAP[deviceCode] || 'namu';

        function setLang(lang) {
            selectedLang = lang;
            window._WIKI = lang;
            document.getElementById('lang-btn-label').textContent = LANG_LABELS[lang] || lang;
            document.querySelectorAll('.lang-option').forEach(el => {
                el.classList.toggle('active', el.dataset.lang === lang);
            });
            applyI18n();
        }

        document.getElementById('lang-btn').addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        });
        document.addEventListener('click', () => {
            document.getElementById('lang-dropdown').classList.add('hidden');
        });
        document.querySelectorAll('.lang-option').forEach(el => {
            el.addEventListener('click', () => {
                setLang(el.dataset.lang);
                document.getElementById('lang-dropdown').classList.add('hidden');
            });
        });

        /* ── 게임 위키 선택 (별도 — UI 언어와 무관) ─── */
        const DEVICE_WIKI_MAP = { ko: 'namu', en: 'en', de: 'de', fr: 'fr', ja: 'ja' };
        let selectedWiki = DEVICE_WIKI_MAP[deviceCode] || 'namu';

        const WIKI_BADGE_LABELS = {
            namu: '나무위키', ko: '위키백과',
            en: 'Wikipedia (EN)', de: 'Wikipedia (DE)',
            fr: 'Wikipédia (FR)', ja: 'ウィキペディア',
        };

        function setWiki(wiki) {
            selectedWiki = wiki;
            document.querySelectorAll('.wiki-card').forEach(el => {
                el.style.borderColor = el.dataset.wiki === wiki ? 'var(--accent, #FF6B35)' : '';
                el.style.background  = el.dataset.wiki === wiki ? 'rgba(255,107,53,0.08)' : '';
            });
            const badge = document.getElementById('wiki-badge');
            if (badge) badge.textContent = WIKI_BADGE_LABELS[wiki] || wiki;
            updateDatalist(wiki);
            document.getElementById('start-input').value = '';
            document.getElementById('goal-input').value = '';
        }

        document.querySelectorAll('.wiki-card').forEach(el => {
            el.addEventListener('click', () => {
                setWiki(el.dataset.wiki);
                showScreen('screen-difficulty');
            });
        });

        /* ── 자동완성 ─────────────────────────────── */
        const WIKI_ALL_PAGES = {{ wiki_all_pages | safe }};

        function updateDatalist(wiki) {
            const dl = document.getElementById('page-suggestions');
            dl.innerHTML = '';
            (WIKI_ALL_PAGES[wiki] || WIKI_ALL_PAGES['namu']).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                dl.appendChild(opt);
            });
        }

        /* ── 초기화 ──────────────────────────────── */
        setLang(selectedLang);
        setWiki(selectedWiki);

        /* ── 화면 전환 ──────────────────────────── */
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('screen-hidden'));
            document.getElementById(id).classList.remove('screen-hidden');
        }

        /* ── 게임 실행 ──────────────────────────── */
        function launchGame(start, goal, difficulty) {
            if (!start || !goal) return;
            if (start === goal) { alert(t('alertSamePage')); return; }
            const gs = {
                start, goal, startTime: Date.now(),
                path: [start], hops: 0, active: true,
                difficulty: difficulty || 'unknown',
                wiki: selectedWiki,
            };
            localStorage.setItem('namuSpeedrun', JSON.stringify(gs));
            document.body.insertAdjacentHTML('beforeend',
                `<div id="launch-overlay" style="position:fixed;inset:0;background:rgba(7,11,20,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;">
                    <div style="font-size:2.4rem;animation:spin 1s linear infinite">🔗</div>
                    <div style="background:linear-gradient(120deg,#FF6B35,#FF4ECD,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;font-size:1.2rem">${t('loadingText')}</div>
                    <div style="color:#7B8FAD;font-size:0.85rem">${t('loadingPreparing')(start)}</div>
                    <style>@keyframes spin{0%{transform:rotate(-15deg) scale(1)}50%{transform:rotate(15deg) scale(1.2)}100%{transform:rotate(-15deg) scale(1)}}</style>
                </div>`
            );
            window.location.href =
                `/page/${encodeURIComponent(start)}?goal=${encodeURIComponent(goal)}&wiki=${encodeURIComponent(selectedWiki)}`;
        }

        async function startByDifficulty(difficulty) {
            const card = document.querySelector(`.diff-card[data-difficulty="${difficulty}"]`);
            if (card) { card.classList.add('diff-card-loading'); card.disabled = true; }
            try {
                const res  = await fetch(`/api/random-game?difficulty=${difficulty}&wiki=${encodeURIComponent(selectedWiki)}`);
                const data = await res.json();
                launchGame(data.start, data.goal, difficulty);
            } catch (e) {
                alert(t('alertLoadFail'));
            } finally {
                if (card) { card.classList.remove('diff-card-loading'); card.disabled = false; }
            }
        }

        function randomPage(inputId) {
            const pages = WIKI_ALL_PAGES[selectedWiki] || WIKI_ALL_PAGES['namu'];
            if (!pages || pages.length === 0) return;
            document.getElementById(inputId).value = pages[Math.floor(Math.random() * pages.length)];
        }

        /* ── 랭킹 모달 ──────────────────────────── */
        let activeLbDifficulty = 'easy';

        function openLeaderboard(difficulty) {
            document.getElementById('leaderboard-modal').hidden = false;
            switchLbTab(difficulty ?? activeLbDifficulty);
        }
        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').hidden = true;
        }
        function switchLbTab(difficulty) {
            activeLbDifficulty = difficulty || 'easy';
            document.querySelectorAll('.lb-tab').forEach(tab => {
                tab.classList.toggle('lb-tab-active', tab.dataset.difficulty === activeLbDifficulty);
            });
            loadRanking(activeLbDifficulty);
        }

        function fmtMs(ms) {
            const s = Math.floor(ms / 1000), m = Math.floor(s / 60), ss = s % 60;
            const cs = Math.floor((ms % 1000) / 10);
            return m > 0
                ? `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
                : `${String(ss).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
        }

        function diffBadgeHtml(d) {
            const map = {
                easy:      [t('diffEasy'),      '#00b894'],
                medium:    [t('diffMedium'),     '#fdcb6e'],
                hard:      [t('diffHard'),       '#e17055'],
                very_hard: [t('diffVeryHard'),   '#d63031'],
            };
            const [label, color] = map[d] || ['?', '#7d8590'];
            return `<span class="lb-diff" style="color:${color};border-color:${color}40">${label}</span>`;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function loadRanking(difficulty) {
            const el = document.getElementById('lb-content');
            el.innerHTML = `<div class="lb-loading">${t('lbLoading')}</div>`;
            try {
                let url = `/api/ranking?wiki=${encodeURIComponent(selectedWiki)}&limit=20`;
                if (difficulty) url += `&difficulty=${encodeURIComponent(difficulty)}`;
                const data = await fetch(url).then(r => r.json());
                if (!data.rankings?.length) {
                    el.innerHTML = `<div class="lb-empty">${t('lbEmpty')}</div>`;
                    return;
                }
                const rows = data.rankings.map((r, i) => {
                    const medal = ['🥇','🥈','🥉'][i] ?? `${i+1}`;
                    return `<tr>
                        <td class="lb-rank">${medal}</td>
                        <td class="lb-nick">${esc(r.nickname)}</td>
                        <td class="lb-route">${esc(r.start)} → ${esc(r.goal)}</td>
                        <td class="lb-hops">${r.hops}${t('hopsUnit')}</td>
                        <td class="lb-time">${fmtMs(r.elapsed_ms)}</td>
                        <td>${diffBadgeHtml(r.difficulty)}</td>
                    </tr>`;
                }).join('');
                el.innerHTML = `<table class="lb-table">
                    <thead><tr>
                        <th>${t('lbRank')}</th><th>${t('lbNick')}</th><th>${t('lbRoute')}</th>
                        <th>${t('lbHops')}</th><th>${t('lbTime')}</th><th>${t('lbDifficulty')}</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
            } catch {
                el.innerHTML = `<div class="lb-empty">${t('lbFail')}</div>`;
            }
        }

        /* ── 이벤트 연결 ─────────────────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-go-difficulty').addEventListener('click', () => showScreen('screen-wiki'));
            document.getElementById('btn-back-wiki').addEventListener('click', () => showScreen('screen-intro'));
            document.getElementById('btn-back-diff').addEventListener('click', () => showScreen('screen-wiki'));

            document.querySelectorAll('.diff-card').forEach(card => {
                card.addEventListener('click', () => startByDifficulty(card.dataset.difficulty));
            });

            document.getElementById('start-random').addEventListener('click', () => randomPage('start-input'));
            document.getElementById('goal-random').addEventListener('click', () => randomPage('goal-input'));
            document.getElementById('btn-custom-start').addEventListener('click', () => {
                const start = document.getElementById('start-input').value.trim();
                const goal  = document.getElementById('goal-input').value.trim();
                if (!start) { alert(t('alertNoStart')); return; }
                if (!goal)  { alert(t('alertNoGoal'));  return; }
                launchGame(start, goal, 'custom');
            });
            document.querySelectorAll('#start-input, #goal-input').forEach(inp => {
                inp.addEventListener('keydown', e => {
                    if (e.key === 'Enter') document.getElementById('btn-custom-start').click();
                });
            });

            document.getElementById('btn-open-lb-intro').addEventListener('click', () => openLeaderboard('easy'));
            document.getElementById('btn-open-lb-diff').addEventListener('click', () => openLeaderboard('easy'));
            document.getElementById('close-leaderboard').addEventListener('click', closeLeaderboard);
            document.getElementById('leaderboard-modal').addEventListener('click', e => {
                if (e.target.id === 'leaderboard-modal') closeLeaderboard();
            });
            document.querySelectorAll('.lb-tab').forEach(tab => {
                tab.addEventListener('click', () => switchLbTab(tab.dataset.difficulty));
            });
        });
    </script>
</body>
</html>
