<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ title }} — Linky Run</title>
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/hud.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            background: #0a0812;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
            line-height: 1.7;
        }
        .wiki-wrap {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }
        .wiki-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: #e2e8f0;
            border-bottom: 2px solid #2a2548;
            padding-bottom: 12px;
            margin-bottom: 20px;
            word-break: keep-all;
        }
        .wiki-content h2 { font-size: 1.3rem; font-weight: 700; color: #c4b5fd; margin: 24px 0 8px; border-bottom: 1px solid #2a2548; padding-bottom: 6px; }
        .wiki-content h3 { font-size: 1.15rem; font-weight: 700; color: #a78bfa; margin: 18px 0 6px; }
        .wiki-content h4 { font-size: 1.05rem; font-weight: 600; color: #8b5cf6; margin: 14px 0 4px; }
        .wiki-content h5, .wiki-content h6 { font-size: 1rem; font-weight: 600; color: #7c3aed; margin: 12px 0 4px; }
        .wiki-content p  { margin: 8px 0; color: #cbd5e1; word-break: keep-all; }
        .wiki-content hr { border: none; border-top: 1px solid #2a2548; margin: 16px 0; }
        .wiki-content ul, .wiki-content ol { margin: 6px 0 6px 20px; color: #cbd5e1; }
        .wiki-content li { margin: 3px 0; }
        .wiki-content blockquote {
            border-left: 3px solid #2a2548;
            padding: 6px 12px;
            margin: 8px 0;
            color: #94a3b8;
            background: rgba(42,37,72,0.3);
            border-radius: 0 6px 6px 0;
        }
        .wiki-content strong { color: #e2e8f0; font-weight: 700; }
        .wiki-content em     { color: #c4b5fd; font-style: italic; }
        .wiki-content s      { opacity: 0.5; }
        .wiki-content sup, .wiki-content sub { font-size: 0.75em; }
        .wiki-content a.wiki-link {
            color: #8b5cf6;
            text-decoration: none;
            border-bottom: 1px solid rgba(139,92,246,0.3);
            transition: color 0.1s, border-color 0.1s;
        }
        .wiki-content a.wiki-link:hover {
            color: #a78bfa;
            border-color: #a78bfa;
        }
        .wiki-content a.ext-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9em;
        }
        .wiki-ext-bar {
            text-align: right;
            padding: 8px 0 4px;
            margin-bottom: 12px;
        }
        .wiki-ext-bar a {
            font-size: 0.8rem;
            color: #4a4a6a;
            text-decoration: none;
            border: 1px solid #2a2548;
            padding: 3px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<!-- HUD -->
<div id="rh-pad"></div>
<header id="rh-hud">
    <div class="rh-hud-left">
        <div class="rh-hud-stat">
            <span class="rh-hud-icon">⏱</span>
            <span class="rh-hud-val" id="rh-timer">00:00</span>
        </div>
        <div class="rh-hud-stat">
            <span class="rh-hud-icon">🔗</span>
            <span class="rh-hud-val" id="rh-hops">0</span>
        </div>
    </div>
    <div class="rh-hud-center">
        <span class="rh-hud-goal-label">목표</span>
        <span class="rh-hud-goal" id="rh-goal">—</span>
    </div>
    <div class="rh-hud-right">
        <button class="rh-btn" onclick="rhTogglePath()">경로</button>
        <button class="rh-btn rh-btn-danger" onclick="rhGiveUp()">포기</button>
    </div>
</header>

<div id="rh-path-panel" style="display:none">
    <div id="rh-path-content"><span class="rh-path-item">이동 경로 없음</span></div>
</div>

<!-- 빅토리 오버레이 -->
<div id="rh-victory" style="display:none">
    <div class="rh-v-card">
        <div class="rh-v-icon">🎉</div>
        <div class="rh-v-title">목표 달성!</div>
        <div class="rh-v-stats">
            <div class="rh-v-stat">
                <div class="rh-v-stat-label">소요 시간</div>
                <div class="rh-v-stat-val" id="rh-v-time">—</div>
            </div>
            <div class="rh-v-stat">
                <div class="rh-v-stat-label">이동 횟수</div>
                <div class="rh-v-stat-val" id="rh-v-hops">—</div>
            </div>
        </div>
        <div>
            <div class="rh-v-path-label">이동 경로</div>
            <div class="rh-v-path" id="rh-v-path"></div>
        </div>
        <div>
            <div class="rh-rank-title">🏆 랭킹에 등록하기</div>
            <div id="rh-rank-row" class="rh-rank-row">
                <input type="text" id="rh-nickname" class="rh-rank-input"
                       placeholder="닉네임 (최대 20자)" maxlength="20" autocomplete="off">
                <button class="rh-rank-submit" id="rh-rank-btn" onclick="rhSubmitRank()">등록</button>
            </div>
            <div class="rh-rank-result" id="rh-rank-result" style="display:none"></div>
        </div>
        <div class="rh-v-actions">
            <button class="rh-v-btn rh-v-btn-primary" onclick="rhPlayAgain()">다시 하기</button>
            <button class="rh-v-btn rh-v-btn-secondary" onclick="rhShare()">공유하기 📤</button>
        </div>
    </div>
</div>

<!-- 나무위키 본문 -->
<div class="wiki-wrap">
    <div class="wiki-ext-bar">
        <a href="https://namu.wiki/w/{{ title | encode_uri }}" target="_blank" rel="noopener">
            나무위키에서 보기 ↗
        </a>
    </div>
    <h1 class="wiki-title">{{ title }}</h1>
    <div class="wiki-content">
        {{ content | safe }}
    </div>
</div>

<script>
const PAGE_TITLE = {{ title | tojson }};
const GOAL       = {{ goal  | tojson }};
const IS_GOAL    = {{ is_goal | tojson }};
</script>
<script src="/static/js/proxy.js"></script>
</body>
</html>
